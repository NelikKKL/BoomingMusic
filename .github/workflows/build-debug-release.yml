name: Build Debug-Signed Release

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        required: true
        default: 'fdroid'
        type: choice
        options:
          - fdroid
          - normal

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK (debug key — no keystore.properties → fallback to debug)
        env:
          BUILD_VARIANT: ${{ inputs.variant == 'normal' && 'Normal' || 'Fdroid' }}
        run: ./gradlew assemble${{ env.BUILD_VARIANT }}Release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: booming-${{ inputs.variant }}-debug-signed
          path: app/build/outputs/apk/*/release/BoomingMusic-*.apk
          if-no-files-found: error
